<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aafiya Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  margin:0;
  background:#faf7f5;
}

header{
  background:#7a1f3d;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
}

/* PRODUCT CARD */
.product{
  background:white;
  width:250px;
  margin:15px;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

.product img{
  width:100%;
  border-radius:10px;
}

button{
  background:#7a1f3d;
  color:white;
  border:none;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
  width:100%;
}

/* CART */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:white;
  box-shadow:-5px 0 10px rgba(0,0,0,0.2);
  padding:15px;
  overflow-y:auto;
}

.cart h2{
  text-align:center;
}

.cart-item{
  border-bottom:1px solid #ddd;
  padding:10px 0;
}

.remove{
  background:red;
  padding:5px;
  font-size:12px;
  margin-top:5px;
}

.checkout{
  background:green;
  margin-top:15px;
}
</style>
</head>

<body>

<header>
<h1>Aafiya Collections</h1>
</header>

<!-- PRODUCTS -->
<div class="container">

<div class="product">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
<h3>Royal Saree</h3>
<p>Rs. 4500</p>
<button onclick="addToCart('Royal Saree',4500)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1623609163859-ca93c959b98a">
<h3>Kurta Set</h3>
<p>Rs. 2500</p>
<button onclick="addToCart('Kurta Set',2500)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1618354691438-25bc04584c23">
<h3>Party Dress</h3>
<p>Rs. 3500</p>
<button onclick="addToCart('Party Dress',3500)">Add to Cart</button>
</div>

</div>

<!-- CART -->
<div class="cart">
<h2>Cart 🛒</h2>

<div id="cart-items"></div>

<h3>Total: Rs. <span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">Checkout via WhatsApp</button>
</div>

<script>

let cart = [];

function addToCart(name, price){
  cart.push({name, price});
  renderCart();
}

function removeItem(index){
  cart.splice(index,1);
  renderCart();
}

function renderCart(){
  let container = document.getElementById("cart-items");
  let total = 0;
  container.innerHTML = "";

  cart.forEach((item, index)=>{
    total += item.price;

    container.innerHTML += `
      <div class="cart-item">
        <p>${item.name} - Rs. ${item.price}</p>
        <button class="remove" onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function checkout(){
  let msg = "Hello, I want to order:%0A";

  cart.forEach(item=>{
    msg += "- " + item.name + " Rs." + item.price + "%0A";
  });

  let total = cart.reduce((sum,i)=>sum+i.price,0);
  msg += "%0ATotal: Rs." + total;

  window.open("https://wa.me/9779764824464?text=" + msg);
}

</script>

</body>
</html>
